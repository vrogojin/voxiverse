# VOXIVERSE game server — nginx main config
# Serves the Godot 4 Web (HTML5) export with cross-origin isolation.
#
# The per-domain server blocks live in /etc/nginx/conf.d/voxiverse.conf,
# rendered at container start from a template by the entrypoint.

user  www-data;
worker_processes  auto;
error_log  /var/log/nginx/error.log  warn;
pid        /run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;     # includes `application/wasm wasm;` (ensured at build)
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout  65;
    server_tokens   off;

    # Large engine payloads (Godot .wasm/.pck can be tens of MB).
    client_max_body_size 64m;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
    access_log  /var/log/nginx/access.log  main;

    # ---- Compression -------------------------------------------------------
    # Prefer precompressed *.gz siblings (generated at deploy time) via
    # gzip_static; fall back to on-the-fly gzip for anything without one.
    gzip              on;
    gzip_static       on;
    gzip_vary         on;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_types        text/plain text/css application/javascript text/javascript
                      application/json application/wasm image/svg+xml
                      application/octet-stream;

    include /etc/nginx/conf.d/*.conf;
}
